services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: stock-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stock-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # FastAPI HTTP/WebSocket server. Stateless, externally exposed.
  backend:
    build: ./backend
    container_name: stock-backend
    env_file: backend/.env
    # Override host-only DB/Redis URLs with compose-internal hostnames.
    # Local dev (uvicorn from host) still uses backend/.env's localhost values.
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # APScheduler-based background worker. Internal only, singleton.
  # Same image as backend, different entrypoint per docs/risks R4 decision.
  worker:
    build: ./backend
    container_name: stock-worker
    command: ["python", "-m", "app.workers.runner"]
    env_file: backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      BACKUP_DIR: /backups
    volumes:
      # Daily pg_dump output lands here (R5). Operator points off-site
      # backup (Synology Hyper Backup / B2 / S3) at the host side path.
      - ./backups:/backups
    # No ports exposed — worker has zero external attack surface.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
